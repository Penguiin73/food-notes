<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI FOOD NOTES V6</title>
    <style>
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }
        :root {
            --bg-color: #f7f7f7;
            --header-bg: #ffffff;
            --text-color: #333333;
            --sub-text-color: #999999;
            --border-color: #e0e0e0;
            --primary-action-color: #5bb76a; 
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --base-font-size: 14px;
        }
        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-size: var(--base-font-size);
        }
        header {
            background-color: var(--header-bg);
            color: var(--text-color);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header .logo-container {
            flex: 1;
            text-align: center;
            position: absolute;
            left: 0; right: 0;
        }
        header .logo { 
            font-weight: bold; 
            font-size: 16px; 
        }
        .header-btn {
            background: none;
            border: none;
            color: var(--sub-text-color);
            cursor: pointer;
            font-size: var(--base-font-size);
            z-index: 2; 
            padding: 5px 10px;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--bg-color);
        }
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            max-width: 100%;
            gap: 8px;
        }
        .user-message-wrapper {
            align-self: flex-end;
            flex-direction: row-reverse; 
        }
        .ai-message-wrapper {
            align-self: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background-color: #f0f0f0; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0; 
            cursor: pointer;
        }
        .bubble {
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: var(--base-font-size);
            padding: 8px 12px;
            max-width: 75vw;
        }
        .ai-bubble {
            background-color: #F9F9F9;
            color: #2b2b2b;
            border: 1px solid #DFDFDF;
            border-radius: 5px;
            position: relative;
            overflow: visible;
            margin-left: 10px;
        }
        .ai-bubble::before {
            content: "";
            position: absolute;
            left: -6px;
            top: 12px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-right: 6px solid #DFDFDF;
            z-index: 1;
        }
        .ai-bubble::after {
            content: "";
            position: absolute;
            left: -5px;
            top: 12px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-right: 6px solid #F9F9F9;
            z-index: 2;
        }
        .user-bubble {
            background-color: #E3EEFD;
            color: #2b2b2b;
            border: 1px solid #CAD3E7;
            border-radius: 5px;
            position: relative;
            overflow: visible;
            margin-right: 10px;
        }
        .user-bubble::before {
            content: "";
            position: absolute;
            right: -6px;
            top: 12px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid #CAD3E7;
            z-index: 1;
        }
        .user-bubble::after {
            content: "";
            position: absolute;
            right: -5px;
            top: 12px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid #E3EEFD;
            z-index: 2;
        }
        .time-wrapper {
            font-size: 11px;
            color: #bbb;
            margin-top: 3px;
            margin-bottom: -5px;
        }
        .user-time-wrapper { text-align: right; margin-right: 56px; }
        .ai-time-wrapper { text-align: left; margin-left: 56px; }
        .thinking { font-size: 12px; color: #bbb; align-self: flex-start; margin-left: 56px; margin-top: 5px; }
        #input-area {
            background-color: var(--header-bg);
            padding: 10px;
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border-color);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        #plus-btn {
            background: none; border: none; font-size: 24px; color: #bbb; cursor: pointer; padding: 0 5px;
        }
        #user-input {
            flex: 1; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 20px; outline: none; font-size: var(--base-font-size); background: #fafafa;
        }
        #user-input:focus { border-color: #bbb; background: #ffffff; }
        #send-btn {
            background-color: var(--primary-action-color); color: #ffffff; border: none; padding: 0 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: var(--base-font-size);
        }
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #ffffff; padding: 25px; border-radius: 10px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; max-height: 85vh; overflow-y: auto;
        }
        .modal-content h3 { margin: 0; text-align: center; font-size: 18px; }
        .modal-content label { font-size: var(--base-font-size); font-weight: bold; color: #333; }
        .modal-content input, .modal-content textarea, .modal-content select { 
            padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; width: 100%; box-sizing: border-box; font-size: var(--base-font-size); font-family: var(--font-stack);
        }
        textarea#ai-role-input {
            min-height: 120px;
            height: 120px;
            resize: none; 
            overflow-y: auto; 
        }
        .modal-action-btn {
            background-color: var(--primary-action-color); border: none; color: #ffffff; padding: 12px; border-radius: 4px; cursor: pointer; text-align: center; font-weight: bold; font-size: var(--base-font-size);
        }
        .danger-btn { border: 1px solid #ff4747; color: #ff4747; background: #ffffff; }
        .danger-btn:hover { background-color: #ff4747; color: #ffffff; }
        .modal-content .sub-tip { font-size: 12px; color: #999; margin-top: -10px; }
        .btn-group { display: flex; gap: 10px; }
        .btn-group button { flex: 1; }
        .avatar-setup { display: flex; gap: 15px; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 8px; }
        .avatar-setup div { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .avatar-setup-btn { background: #fff; border: 1px solid #ccc; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 13px; color: #333; }
    </style>
</head>
<body>

<header>
    <button class="header-btn" onclick="goBack()">返回</button>
    <div class="logo-container">
        <div class="logo">Food Notes</div>
    </div>
    <button class="header-btn" onclick="openSettings()">设置</button>
</header>

<div id="chat-container">
</div>

<div id="input-area">
    <button id="plus-btn">+</button>
    <input type="text" id="user-input" placeholder="在这说话..." autocomplete="off">
    <button id="send-btn">发送</button>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>设置</h3>
        <label>头像设置 (用户 / AI):</label>
        <div class="avatar-setup">
            <div id="user-avatar-preview" class="avatar" style="width: 48px; height: 48px;"></div>
            <div>
                <button class="avatar-setup-btn" onclick="handleAvatarUpload('user')">选择用户头像</button>
                <input type="text" id="user-avatar-url" placeholder="或填写图片链接">
            </div>
        </div>
        <div class="avatar-setup" style="margin-top:-5px;">
            <div id="ai-avatar-preview" class="avatar" style="width: 48px; height: 48px;"></div>
            <div>
                <button class="avatar-setup-btn" onclick="handleAvatarUpload('ai')">选择 AI 头像</button>
                <input type="text" id="ai-avatar-url" placeholder="或填写图片链接">
            </div>
        </div>
        <button class="modal-action-btn danger-btn" onclick="clearAvatars()">重置头像</button>
        <hr style="border:0; border-top: 1px solid #eee; margin: 5px 0;">
        <label>AI 性格 (角色扮演填这里):</label>
        <textarea id="ai-role-input" placeholder="例如：你是一个活泼好动的邻家小妹妹，专门负责吃货避雷。性格外向，喜欢用可爱语气。"></textarea>
        <span class="sub-tip">填入你想让 AI 扮演的角色和性格。留空为默认活泼美食助手。</span>
        <label>API Key:</label>
        <input type="password" id="api-key-input" placeholder="sk-...">
        <label>Base URL:</label>
        <input type="text" id="api-url-input" placeholder="例如: https://api.openai.com/v1">
        <button class="modal-action-btn" onclick="testAndFetchModels()" id="test-btn-text" style="background:#333;">测试并获取模型</button>
        <div class="model-section" id="model-section" style="display:none; background:#fafafa; padding:15px; border: 1px solid #eee; border-radius: 4px;">
            <label style="margin-bottom: 8px; display: block;">选择模型:</label>
            <select id="model-select"></select>
        </div>
        <button class="modal-action-btn" onclick="saveSettings()">保存并关闭</button>
        <button class="header-btn" style="color: #666; width:100%; background: none; padding: 10px;" onclick="closeSettings()">取消</button>
        <hr style="border: 0; border-top: 1px solid #eee; width: 100%; margin: 5px 0;">
        <div class="btn-group">
            <button class="modal-action-btn danger-btn" onclick="clearChat()">清空聊天记录</button>
            <button class="modal-action-btn danger-btn" onclick="clearDatabase()">清空避雷记录</button>
        </div>
    </div>
</div>

<script>
    const DB_KEY = 'food_db_v4_flat';
    const KEY_STORAGE = 'my_openai_key';
    const URL_STORAGE = 'my_openai_url';
    const MODEL_STORAGE = 'my_ai_model';
    const USER_AVATAR_KEY = 'food_user_avatar_v1';
    const AI_AVATAR_KEY = 'food_ai_avatar_v1';
    const AI_ROLE_KEY = 'my_ai_role_v1';
    const CHAT_HISTORY_KEY = 'food_chat_history_v6_bubbles'; 

    function goBack() { alert('该文件为本地打开，无法返回。'); }

    function handleAvatarUpload(who) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Url = event.target.result;
                localStorage.setItem(who === 'user' ? USER_AVATAR_KEY : AI_AVATAR_KEY, base64Url);
                document.getElementById(`${who}-avatar-preview`).style.backgroundImage = `url(${base64Url})`;
                document.getElementById(`${who}-avatar-url`).value = ''; 
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function clearAvatars() {
        if(confirm("确定清空头像配置吗？")) {
            localStorage.removeItem(USER_AVATAR_KEY);
            localStorage.removeItem(AI_AVATAR_KEY);
            document.getElementById('user-avatar-preview').style.backgroundImage = '';
            document.getElementById('ai-avatar-preview').style.backgroundImage = '';
            document.getElementById('user-avatar-url').value = '';
            document.getElementById('ai-avatar-url').value = '';
            alert("头像已重置。");
        }
    }

    function openSettings() {
        document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('api-key-input').value = localStorage.getItem(KEY_STORAGE) || '';
        document.getElementById('api-url-input').value = localStorage.getItem(URL_STORAGE) || 'https://api.openai.com/v1';
        document.getElementById('ai-role-input').value = localStorage.getItem(AI_ROLE_KEY) || '';

        loadAvatarPreview('user');
        loadAvatarPreview('ai');

        const savedModel = localStorage.getItem(MODEL_STORAGE);
        if (savedModel) {
            const select = document.getElementById('model-select');
            select.innerHTML = `<option value="${savedModel}">${savedModel} (已保存)</option>`;
            document.getElementById('model-section').style.display = 'block';
        }
    }

    function loadAvatarPreview(who) {
        const previewEl = document.getElementById(`${who}-avatar-preview`);
        const urlInputEl = document.getElementById(`${who}-avatar-url`);
        const savedAvatar = localStorage.getItem(who === 'user' ? USER_AVATAR_KEY : AI_AVATAR_KEY);
        if (savedAvatar) {
            previewEl.style.backgroundImage = `url(${savedAvatar})`;
            if (!savedAvatar.startsWith('data:image')) {
                urlInputEl.value = savedAvatar;
            } else {
                urlInputEl.value = ''; 
            }
        } else {
            previewEl.style.backgroundImage = '';
            urlInputEl.value = '';
        }
    }

    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

    async function testAndFetchModels() {
        const key = document.getElementById('api-key-input').value.trim();
        let baseUrl = document.getElementById('api-url-input').value.trim();
        const testBtn = document.getElementById('test-btn-text');

        if (!key || !baseUrl) { alert("Key、地址不能为空！"); return; }
        if (baseUrl.endsWith('/chat/completions')) { baseUrl = baseUrl.replace('/chat/completions', ''); }

        testBtn.innerText = "连接中..."; testBtn.disabled = true;

        try {
            const response = await fetch(`${baseUrl}/models`, { method: 'GET', headers: { 'Authorization': `Bearer ${key}` } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (data.data && Array.isArray(data.data)) {
                const select = document.getElementById('model-select');
                select.innerHTML = ''; data.data.forEach(model => { const option = document.createElement('option'); option.value = model.id; option.text = model.id; select.appendChild(option); });
                document.getElementById('model-section').style.display = 'block';
                testBtn.innerText = "模型获取成功"; testBtn.style.backgroundColor = "#5bb76a";
            } else { throw new Error("返回格式不对。"); }
        } catch (error) { testBtn.innerText = "获取失败"; alert("报错: " + error.message); } finally { testBtn.disabled = false; }
    }

    function saveSettings() {
        const key = document.getElementById('api-key-input').value.trim();
        const url = document.getElementById('api-url-input').value.trim();
        const modelSelect = document.getElementById('model-select');
        const model = modelSelect ? modelSelect.value : null;
        const role = document.getElementById('ai-role-input').value.trim();

        handleUrlAvatarSave('user');
        handleUrlAvatarSave('ai');

        if (!key || !url || !model) { alert("填入配置并成功选择模型后再保存！"); return; }

        localStorage.setItem(KEY_STORAGE, key);
        localStorage.setItem(URL_STORAGE, url);
        localStorage.setItem(MODEL_STORAGE, model);
        if (role) { localStorage.setItem(AI_ROLE_KEY, role); } else { localStorage.removeItem(AI_ROLE_KEY); }
        
        alert("保存成功！"); closeSettings();
        location.reload(); 
    }

    function handleUrlAvatarSave(who) {
        const url = document.getElementById(`${who}-avatar-url`).value.trim();
        if (url) {
            localStorage.setItem(who === 'user' ? USER_AVATAR_KEY : AI_AVATAR_KEY, url);
        }
    }

    function clearDatabase() { if(confirm("清空避雷记录吗？")) { localStorage.removeItem(DB_KEY); alert("避雷记忆已清空！"); } }
    function clearChat() { if(confirm("清空聊天记录吗？")) { localStorage.removeItem(CHAT_HISTORY_KEY); document.getElementById('chat-container').innerHTML = ''; appendMessage('ai', '[ 系统提示 ]: 聊天记录已清空。', false); } }
    function getBlacklist() { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); }

    async function callRealAI(userInput) {
        const apiKey = localStorage.getItem(KEY_STORAGE);
        const baseUrl = localStorage.getItem(URL_STORAGE);
        const modelName = localStorage.getItem(MODEL_STORAGE);
        
        if (!apiKey || !baseUrl || !modelName) { return { reply: "请在设置中配置接口并拉取模型。", action: "none" }; }

        const db = getBlacklist();
        let userDefinedRole = localStorage.getItem(AI_ROLE_KEY) || '你是一个活泼开朗的美食记事本助手。性格外向，喜欢用可爱、热情的语气。专门负责避雷。';
        
        const systemPrompt = `你是个干练且性格鲜明的美食助手。
用户当前的避雷数据库有：${JSON.stringify(db)}。

关于你的性格设定，请遵守：
${userDefinedRole}

根据用户的话判断意图，严格返回 JSON，格式：
{"reply": "回复用户的话，用上述设定的性格语气回复", "action": "add/none", "shop": "提取的店名", "reason": "难吃理由"}`;

        try {
            const response = await fetch(`${baseUrl}/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: modelName,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userInput }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            if (data.error) return { reply: `接口报错: ${data.error.message}`, action: "none" };
            
            let resStr = data.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
            return JSON.parse(resStr);
        } catch (err) { return { reply: "网络请求失败。", action: "none" }; }
    }

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');

    function getAvatarUrl(who) {
        return localStorage.getItem(who === 'user' ? USER_AVATAR_KEY : AI_AVATAR_KEY);
    }

    function appendMessage(sender, text, isSave = true) {
        const timeStr = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = `message-wrapper ${sender === 'user' ? 'user-message-wrapper' : 'ai-message-wrapper'}`;

        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        const avatarUrl = getAvatarUrl(sender);
        if (avatarUrl) {
            avatarDiv.style.backgroundImage = `url(${avatarUrl})`;
        }

        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = `bubble ${sender === 'user' ? 'user-bubble' : 'ai-bubble'}`;
        bubbleDiv.innerText = text;

        wrapperDiv.appendChild(avatarDiv);
        wrapperDiv.appendChild(bubbleDiv);

        const timeWrapperDiv = document.createElement('div');
        timeWrapperDiv.className = `time-wrapper ${sender === 'user' ? 'user-time-wrapper' : 'ai-time-wrapper'}`;
        timeWrapperDiv.innerText = timeStr;

        chatContainer.appendChild(wrapperDiv);
        chatContainer.appendChild(timeWrapperDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        if (isSave) {
            let history = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY) || '[]');
            history.push({ sender: sender, text: text, time: timeStr });
            if (history.length > 50) history = history.slice(history.length - 50);
            localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(history));
        }
    }

    function appendThinking() {
        const div = document.createElement('div');
        div.className = 'thinking'; div.id = 'thinking-indicator'; div.innerText = '正在输入...';
        chatContainer.appendChild(div); chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text, true);
        userInput.value = '';
        
        appendThinking();

        const aiResponse = await callRealAI(text);
        
        const thinkingIndicator = document.getElementById('thinking-indicator');
        if (thinkingIndicator) thinkingIndicator.remove();

        if (aiResponse.action === 'add' && aiResponse.shop) {
            const db = getBlacklist();
            db[aiResponse.shop] = { reason: aiResponse.reason, time: new Date().toLocaleDateString() };
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        appendMessage('ai', aiResponse.reply || JSON.stringify(aiResponse), true);
    }

    document.getElementById('send-btn').addEventListener('click', handleSend);
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });

    window.onload = function() {
        let history = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY) || '[]');
        
        if (history.length > 0) {
            history.forEach(msg => appendMessage(msg.sender, msg.text, false));
        } else {
            if(!localStorage.getItem(KEY_STORAGE)) {
                appendMessage('ai', '[ 系统提示 ]: 请点击右上角设置，填入 API 配置并拉取模型。', false);
            } else {
                let currentModel = localStorage.getItem(MODEL_STORAGE);
                let currentRole = localStorage.getItem(AI_ROLE_KEY) ? "我将扮演你设定的角色。" : "我将使用默认活泼语气说话。";
                appendMessage('ai', `[ 系统提示 ]: 欢迎回來！当前模型: ${currentModel}。${currentRole}`, false);
            }
        }
    };

</script>
</body>
</html>
